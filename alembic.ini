# Alembic configuration for Sentinel — dual-DB setup (M18 resolution).
#
# Two named configurations:
#   - `iam`       : IAM actions database (data/iam_actions.db)
#   - `inventory` : Resource inventory database (data/resource_inventory.db)
#
# Invocation contract (see src/sentinel/migrations.py for the automated path):
#
#     alembic -c alembic.ini -n iam       upgrade head
#     alembic -c alembic.ini -n inventory upgrade head
#
# NOTE: sqlalchemy.url below uses a relative path.  Alembic resolves it
# relative to the invocation cwd — running `alembic` from outside the repo
# root will fail.  Sentinel's production path always invokes via
# `check_and_upgrade_all_dbs()` which resolves paths absolutely, so this
# is only a manual-debug concern.

[alembic]
# Fallback main section so bare `alembic` invocations (no -n flag) still
# parse.  Production always uses -n iam / -n inventory.
script_location = migrations/iam
sqlalchemy.url = sqlite:///data/iam_actions.db

# Named configurations — one per database.
[alembic:iam]
script_location = migrations/iam
sqlalchemy.url = sqlite:///data/iam_actions.db

[alembic:inventory]
script_location = migrations/inventory
sqlalchemy.url = sqlite:///data/resource_inventory.db

# ----------------------------------------------------------------------
# Standard Alembic config (shared across both sub-configs).
# ----------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
