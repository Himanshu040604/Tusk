# Pre-commit hooks (M22).
#
# Run locally via ``uv run pre-commit run --all-files`` and in CI under
# the PR-gate workflow.  The custom secret-grep hook wraps
# :func:`sentinel.secrets_patterns.grep_sources` so the same patterns
# that scrub logs / cassettes also block commits.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        name: ruff-check
        args: ["--fix"]
      - id: ruff-format
        name: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.4
          - types-PyYAML
          - structlog>=25.0
        args: ["--ignore-missing-imports"]
        files: ^src/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: ^tests/cassettes/

  - repo: local
    hooks:
      - id: sentinel-secret-grep
        name: sentinel secret-pattern grep
        entry: python -m sentinel.secrets_patterns
        language: system
        pass_filenames: true
        types: [text]
        # Exclude (a) recorded HTTP cassettes (raw response bodies),
        # (b) the detect-secrets baseline, and (c) files that intentionally
        # contain canonical AWS / GitHub example tokens that the in-house
        # grep would otherwise dogfood-collide on:
        #   - tests/test_secrets_patterns.py — the hook's own regression fixtures
        #   - tests/test_rewriter.py        — Bundle F M3a redaction tests
        #   - README.md / CHANGELOG.md      — documented fake-token examples
        #   - prod_imp.md                   — design-record contains ghp_fake_...
        exclude: |
          (?x)
          ^tests/cassettes/|
          \.secrets\.baseline$|
          ^tests/test_secrets_patterns\.py$|
          ^tests/test_rewriter\.py$|
          ^README\.md$|
          ^CHANGELOG\.md$|
          ^prod_imp\.md$
